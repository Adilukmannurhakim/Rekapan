<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Transaksi - Stok</title>
        <link rel="stylesheet" href="Assets/dashboard.css">
    <!-- Menghubungkan ke file CSS yang sudah dipisah -->
    <link rel="stylesheet" href="Assets/transaksi.css">
    <!-- Menghubungkan ke logika JS khusus transaksi -->
    <script src="Controllers/transaksi.js" defer></script>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- 1. BAGIAN SIDEBAR (Sesuai Desain Anda) -->
        <div class="sidebar">
            <h2 class="sidebar-title">Transaksi</h2>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="stok.html">Stok</a></li>
                <!-- Di halaman ini, Laporan Transaksi yang menggunakan class active -->
                <li><a href="transaksi.html" class="active">Laporan Transaksi</a></li>
                <li><a href="#" id="menuLogout">Logout</a></li>
            </ul>
        </div>

        <!-- 2. BAGIAN KONTEN UTAMA -->
        <div class="main-content">
            
            <!-- HALAMAN TRANSAKSI -->
            <div id="halamanTransaksi">
    <!-- 1. TAMBAHKAN PEMBUNGKUS HEADER & TOMBOL TAMBAH BARU -->
            <div class="header-transaksi" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1>📊 Laporan Transaksi</h1>
                <button class="btn-tambah" id="btnBukaModal">➕ Catat Transaksi</button>
            </div>
            
            <table class="tabel-transaksi">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Produk</th>
                        <th>Tipe</th>
                        <th>Jumlah</th>
                        <th>Total Harga</th>
                        <th>Aksi</th> <!-- 2. TAMBAHKAN KOLOM AKSI DI SINI -->
                    </tr>
                </thead>
                <tbody id="bodyTransaksi">
                    <!-- Data dan Tombol Edit/Hapus akan otomatis disuntik via transaksi.js -->
                </tbody>
            </table>
        </div>
            <div id="modalTransaksi" class="modal">
                <div class="modal-content">
                    <span class="close-btn" id="btnTutupModal">&times;</span>
                    <h3 id="modalTitle">Catat Transaksi</h3>
                    <form id="formTransaksi">
                        <input type="hidden" id="transaksiId">

                        <div class="form-group">
                            <label for="trxNama">Nama Produk</label>
                            <!-- MENGUBAH INPUT MENJADI SELECT DROPDOWN -->
                            <select id="trxNama" required>
                                <option value="">-- Pilih Produk --</option>
                                <!-- Pilihan produk akan dimasukkan secara dinamis oleh JavaScript -->
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="trxTipe">Tipe Transaksi</label>
                            <select id="trxTipe" required>
                                <option value="Masuk">Masuk</option>
                                <option value="Keluar">Keluar</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="trxJumlah">Jumlah</label>
                            <input type="number" id="trxJumlah" required min="1">
                        </div>

                        <div class="form-group">
                            <label for="trxHarga">Total Harga (Rp)</label>
                            <!-- Ditambah readonly dan placeholder agar terlihat profesional -->
                            <input type="number" id="trxHarga" required min="0" readonly placeholder="Otomatis Terhitung">
                        </div>
                        <button type="submit" class="btn-simpan">Simpan</button>
                    </form>
                </div>
            </div>

        </div> <!-- /.main-content -->

    </div> <!-- /.dashboard-container -->
    
</body>
</html>
