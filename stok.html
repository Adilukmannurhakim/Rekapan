<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Stok</title>
    <link rel="stylesheet" href="Assets/dashboard.css">
    <script src="Controllers/stok.js" defer></script>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>Craft</h2>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="stok.html" class="active">Stok</a></li>
                <li><a href="#">Laporan Transaksi</a></li>
                <li><a href="index.html">Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <h1>Manajemen Stok</h1>
                <p>Tambah Produk Bari dan Kelola Stok</p>
            </header>

            <div class="form-container">
                <h2>+ Tambah Produk Baru</h2>
                <form id="productForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nama">Nama</label>
                            <input type="text" id="nama" placeholder="" required>
                        </div>
                        <div class="form-group">
                            <label for="kategori">Kategori</label>
                            <select id="kategori" required>
                                <option value="">--Pilih Kategori--</option>
                                <option value="Dapur">Dapur</option>
                                <option value="Outdoor">Ourdoor</option>
                                <option value="Koleksi">Koleksi</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="harga">Harga (Rp)</label>
                            <input type="number" id="harga" placeholder="" required>
                        </div>
                    <div class="form-group">
                        <label for="stok">Jumlah Stok</label>
                        <input type="number" id="stok" placeholder="" required>
                    </div>    
                    </div>
                    <button type="submit" class="btn-submit">Simpan</button>
                </form>
            </div>

            <div class="table-container">
                <h2>Daftar Produk</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Nama Produk</th>
                            <th>Kategori</th>
                            <th>Harga</th>
                            <th>Stok</th>
                            <th>Edit</th>
                        </tr>
                    </thead>
                    <tbody id="stockTableBody">
                        
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
</body>
</html>
